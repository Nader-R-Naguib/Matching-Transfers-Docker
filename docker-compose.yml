services:
  db:
    image: mysql:8.0
    container_name: transfer_db
    restart: always
    environment:
      
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: transfer_reconciliation
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Automatically run our setup script the first time the DB boots
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql 

  api:
    build: .
    container_name: transfer_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db  
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./data:/app/data
      - model_cache:/root/.cache
    depends_on:
      - db

volumes:
  db_data:
  model_cache: